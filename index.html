<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<header class="top-bar">

<input type="text" placeholder="Search city..." class="search">

<div class="profile">
<i class="fa-solid fa-user"></i>
</div>

</header>

<div class="main-weather card">

<div class="weather-icon">
<i class="fa-solid fa-sun sun"></i>
<i class="fa-solid fa-cloud cloud"></i>
</div>

<h1>26°C</h1>

<p>Saint Little James.<br>Cloudy.</p>

</div>

<div class="info">
<i class="fa-solid fa-sun"></i> Low UV radiation level.
</div>

<div class="cities">

<div class="city card">

<i class="fa-solid fa-cloud-rain"></i>

<h2>09°C</h2>

<p>London.<br>Rain.</p>

</div>

<div class="city card">

<i class="fa-solid fa-sun"></i>

<h2>14°C</h2>

<p>Madrid.<br>Sunny.</p>

</div>

</div>

<div class="alerts">

<div class="alert">
<i class="fa-solid fa-cloud-bolt"></i> Severe thunderstorm warning in...
</div>

<div class="alert">
<i class="fa-solid fa-snowflake"></i> Frostbite in Canada...
</div>

<div class="alert">
<i class="fa-solid fa-fire"></i> Extreme forest fires in Australia...
</div>

<div class="alert">
<i class="fa-solid fa-water"></i> Floods at China’s east coast...
</div>

</div>

</div>

</body>
</html>
